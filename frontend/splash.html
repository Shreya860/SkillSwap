<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - Share Skills, Learn Together</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="gradient-theme.css">
    <style>
        body { background: #0D0D0D; overflow: hidden; }

        .get-started-btn { position: relative; transition: all 0.4s; }
        .get-started-btn:hover { transform: scale(1.08); }

        /* orange glow orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }

        /* logo glow underline */
        .logo-line {
            display: block;
            height: 3px;
            border-radius: 9999px;
            background: linear-gradient(90deg, transparent, #E8460A, #FF6B35, transparent);
            margin: 10px auto 0;
            width: 70%;
            opacity: 0.7;
        }

        /* separator dots */
        .sep-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #E8460A;
            display: inline-block;
            opacity: 0.7;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen font-sans">

    <!-- Ambient orbs -->
    <div class="fixed inset-0 overflow-hidden" style="z-index:0;">
        <div class="orb" style="width:420px;height:420px;background:rgba(232,70,10,0.13);top:-80px;right:-60px;animation:float 5s ease-in-out infinite;"></div>
        <div class="orb" style="width:320px;height:320px;background:rgba(232,70,10,0.08);bottom:-60px;left:-40px;animation:float 6s ease-in-out infinite;animation-delay:1.5s;"></div>
        <div class="orb" style="width:200px;height:200px;background:rgba(255,107,53,0.07);top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 3s ease-in-out infinite;"></div>
    </div>

    <!-- Content -->
    <div class="relative min-h-screen flex flex-col items-center justify-center px-4" style="z-index:1;">

        <!-- Logo -->
        <div class="text-center mb-10 animate-swipe-in">
            <h1 class="font-bluesakura text-white drop-shadow-lg" style="font-size:clamp(3.5rem,12vw,6rem);letter-spacing:0.14em;">
                SKiLlSWaP
            </h1>
            <span class="logo-line animate-fade-in-up delay-200"></span>
            <p class="mt-4 text-sm font-medium tracking-[0.28em] uppercase animate-fade-in-up delay-300" style="color:#E8460A;">
                Share Skills · Learn Together
            </p>
        </div>

        <!-- Hero copy -->
        <div class="max-w-xl text-center mb-12 animate-fade-in-up delay-400">
            <p class="text-2xl md:text-3xl font-medium leading-relaxed mb-3" style="color:#F5F0E8;">
                Everyone has something to teach.<br>
                Everyone has something to learn.
            </p>
            <p class="text-base" style="color:#888580;">
                Join the community where knowledge is shared, not sold.
            </p>
        </div>

        <!-- CTA -->
        <div class="animate-fade-in-up delay-600 flex flex-col items-center gap-3">
            <a href="login.html"
               class="get-started-btn inline-flex items-center gap-3 px-10 py-4 rounded-full font-bold text-lg text-white glow-effect"
               style="background:#E8460A;box-shadow:0 0 40px rgba(232,70,10,0.4);">
                Get Started
                <svg class="w-5 h-5 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                </svg>
            </a>
            <p class="text-xs" style="color:#888580;letter-spacing:0.08em;">Join now · It's free</p>
        </div>

    </div>
</body>
</html>
