<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - SkillSwap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="gradient-theme.css">
    <script src="auth.js"></script>
    <script src="crypto.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0D0D0D; color: #F5F0E8;
            font-family: 'DM Sans', sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }
        .chat-shell { display: flex; flex: 1; height: calc(100vh - 64px); overflow: hidden; }

        /* ── Sidebar ── */
        .sidebar {
            width: 320px; min-width: 280px;
            background: #111111; border-right: 1px solid rgba(255,255,255,0.07);
            display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.3s ease;
        }
        .sidebar-header { padding: 20px 18px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .sidebar-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:#F5F0E8; margin-bottom:14px; }
        .sidebar-title span { color:#E8460A; }
        .sidebar-search { position: relative; }
        .sidebar-search input {
            width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.09);
            border-radius:12px; padding:9px 14px 9px 36px; color:#F5F0E8;
            font-size:13px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.2s;
        }
        .sidebar-search input:focus { border-color:#E8460A; box-shadow:0 0 0 3px rgba(232,70,10,0.1); }
        .sidebar-search input::placeholder { color:#444; }
        .sidebar-search-icon { position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#555;pointer-events:none;width:14px;height:14px; }
        .contact-list { flex:1; overflow-y:auto; padding:8px 0; }
        .contact-list::-webkit-scrollbar { width:3px; }
        .contact-list::-webkit-scrollbar-thumb { background:rgba(232,70,10,0.3); border-radius:999px; }
        .contact-item {
            display:flex; align-items:center; gap:12px; padding:12px 18px;
            cursor:pointer; transition:background 0.18s; position:relative;
            border-left:3px solid transparent;
        }
        .contact-item:hover { background:rgba(255,255,255,0.04); }
        .contact-item.active { background:rgba(232,70,10,0.08); border-left-color:#E8460A; }
        .contact-avatar { position:relative; flex-shrink:0; }
        .contact-avatar img, .contact-avatar .avatar-fallback {
            width:44px; height:44px; border-radius:50%; object-fit:cover;
            background:#1A1A1A; border:2px solid rgba(232,70,10,0.3);
        }
        .contact-avatar .avatar-fallback {
            display:flex; align-items:center; justify-content:center;
            font-family:'Syne',sans-serif; font-weight:800; font-size:16px; color:#E8460A;
        }
        .online-dot { position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:#22c55e;border:2px solid #111111; }
        .contact-info { flex:1; min-width:0; }
        .contact-name { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:#F5F0E8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .contact-skill { font-size:11px; color:#E8460A; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
        .contact-last-msg { font-size:11px; color:#555; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
        .contact-meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
        .contact-time { font-size:10px; color:#444; }
        .unread-badge { background:#E8460A; color:#fff; font-size:10px; font-weight:700; padding:2px 6px; border-radius:999px; min-width:18px; text-align:center; }

        /* ── Chat main ── */
        .chat-main { flex:1; display:flex; flex-direction:column; background:#0D0D0D; min-width:0; }
        .chat-placeholder { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; color:#333; }
        .chat-placeholder-icon { width:72px;height:72px;border-radius:20px;background:rgba(232,70,10,0.08);border:1px solid rgba(232,70,10,0.2);display:flex;align-items:center;justify-content:center; }
        .chat-placeholder p { font-size:15px; color:#444; }
        .chat-placeholder span { font-size:12px; color:#333; }

        /* Chat header */
        .chat-header { padding:14px 20px; background:rgba(13,13,13,0.95); border-bottom:1px solid rgba(255,255,255,0.07); display:flex; align-items:center; gap:14px; backdrop-filter:blur(12px); }
        .chat-header-avatar { position:relative; }
        .chat-header-avatar img, .chat-header-avatar .avatar-fallback { width:40px;height:40px;border-radius:50%;border:2px solid rgba(232,70,10,0.4);background:#1A1A1A;object-fit:cover; }
        .chat-header-avatar .avatar-fallback { display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#E8460A; }
        .chat-header-info { flex:1; }
        .chat-header-name { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; color:#F5F0E8; }
        .chat-header-status { font-size:11px; color:#555; margin-top:1px; display:flex; align-items:center; gap:5px; }
        .chat-header-status .dot { width:7px;height:7px;border-radius:50%;background:#22c55e; }
        .chat-header-status .dot.offline { background:#444; }
        .chat-header-skill-tag { font-size:11px;background:rgba(232,70,10,0.1);color:#FF6B35;border:1px solid rgba(232,70,10,0.25);padding:4px 10px;border-radius:999px; }
        .chat-header-actions { display:flex; gap:8px; }
        .header-btn { width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.18s;color:#888;text-decoration:none; }
        .header-btn:hover { background:rgba(232,70,10,0.12); border-color:rgba(232,70,10,0.3); color:#E8460A; }
        .back-btn { display:none;width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);align-items:center;justify-content:center;cursor:pointer;color:#888;transition:all 0.18s; }
        .back-btn:hover { background:rgba(232,70,10,0.12); border-color:rgba(232,70,10,0.3); color:#E8460A; }

        /* Messages */
        .messages-area { flex:1; overflow-y:auto; padding:20px 20px 10px; display:flex; flex-direction:column; gap:4px; }
        .messages-area::-webkit-scrollbar { width:3px; }
        .messages-area::-webkit-scrollbar-thumb { background:rgba(232,70,10,0.25); border-radius:999px; }
        .date-divider { display:flex; align-items:center; gap:10px; margin:12px 0 8px; }
        .date-divider::before, .date-divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.07); }
        .date-divider span { font-size:10px; color:#444; font-weight:500; white-space:nowrap; }
        .msg-row { display:flex; gap:8px; max-width:72%; animation:msgIn 0.22s ease-out both; }
        @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .msg-row.self { align-self:flex-end; flex-direction:row-reverse; }
        .msg-row.other { align-self:flex-start; }
        .msg-avatar img, .msg-avatar .avatar-fallback { width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#1A1A1A; }
        .msg-avatar .avatar-fallback { display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#E8460A;border:1px solid rgba(232,70,10,0.3); }
        .msg-avatar { display:flex; flex-direction:column; justify-content:flex-end; }
        .msg-content { display:flex; flex-direction:column; gap:2px; }
        .msg-row.self .msg-content { align-items:flex-end; }
        .msg-bubble { padding:10px 14px; border-radius:18px; font-size:14px; line-height:1.5; word-break:break-word; }
        .msg-row.self .msg-bubble { background:#E8460A; color:#fff; border-bottom-right-radius:5px; }
        .msg-row.other .msg-bubble { background:#1A1A1A; color:#F5F0E8; border:1px solid rgba(255,255,255,0.07); border-bottom-left-radius:5px; }
        .msg-time { font-size:10px; color:#444; padding:0 4px; }
        .msg-row.no-avatar .msg-avatar { visibility:hidden; }

        /* Typing indicator */
        .typing-indicator { display:none; align-self:flex-start; align-items:center; gap:8px; padding:4px 0 8px; }
        .typing-indicator.visible { display:flex; }
        .typing-dots { display:flex; gap:4px; background:#1A1A1A; border:1px solid rgba(255,255,255,0.07); padding:10px 14px; border-radius:18px; border-bottom-left-radius:5px; }
        .typing-dot { width:7px;height:7px;border-radius:50%;background:#555;animation:typingBounce 1.2s ease-in-out infinite; }
        .typing-dot:nth-child(2) { animation-delay:0.2s; }
        .typing-dot:nth-child(3) { animation-delay:0.4s; }
        @keyframes typingBounce { 0%,80%,100%{transform:translateY(0);background:#555;}40%{transform:translateY(-5px);background:#E8460A;} }

        /* Input */
        .input-area { padding:12px 16px 16px; background:rgba(13,13,13,0.95); border-top:1px solid rgba(255,255,255,0.06); display:flex; align-items:flex-end; gap:10px; }
        .input-wrap { flex:1; position:relative; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.09); border-radius:16px; display:flex; align-items:flex-end; transition:border-color 0.2s; }
        .input-wrap:focus-within { border-color:#E8460A; box-shadow:0 0 0 3px rgba(232,70,10,0.1); }
        .msg-input { flex:1; background:transparent; border:none; outline:none; color:#F5F0E8; font-family:'DM Sans',sans-serif; font-size:14px; resize:none; max-height:120px; padding:11px 14px; line-height:1.5; }
        .msg-input::placeholder { color:#444; }
        .input-attach { padding:10px 10px 10px 0; color:#444; cursor:pointer; transition:color 0.18s; }
        .input-attach:hover { color:#E8460A; }
        .send-btn { width:44px;height:44px;border-radius:14px;background:#E8460A;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;flex-shrink:0;box-shadow:0 4px 20px rgba(232,70,10,0.4); }
        .send-btn:hover { background:#ff5a1f; transform:scale(1.05); }
        .send-btn:active { transform:scale(0.96); }

        /* Navbar */
        .top-nav { background:rgba(13,13,13,0.95); border-bottom:1px solid rgba(255,255,255,0.07); backdrop-filter:blur(20px); position:sticky;top:0;z-index:50;height:64px;display:flex;align-items:center; }
        .top-nav-inner { max-width:1280px;margin:0 auto;padding:0 24px;width:100%;display:flex;justify-content:space-between;align-items:center; }
        .nav-logo { font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#F5F0E8;text-decoration:none; }
        .nav-links { display:flex; gap:4px; }
        .nav-link { color:rgba(245,240,232,0.5);padding:8px 12px;border-radius:8px;font-size:14px;text-decoration:none;transition:all 0.18s; }
        .nav-link:hover { color:#F5F0E8; background:rgba(255,255,255,0.05); }
        .nav-link.active { color:#E8460A; font-weight:600; }
        .nav-actions { display:flex; gap:10px; align-items:center; }

        .bottom-nav { display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,13,0.95);border-top:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(20px);padding:10px 20px 18px;justify-content:space-around;z-index:100; }
        .bottom-nav a { display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;padding:6px 14px;border-radius:12px;transition:background 0.18s; }
        .bottom-nav a:hover { background:rgba(232,70,10,0.08); }
        .bottom-nav svg { width:22px;height:22px;color:#555; }
        .bottom-nav svg.active { color:#E8460A; }
        .bottom-nav span { font-size:10px;color:#555;font-weight:500; }
        .bottom-nav span.active { color:#E8460A;font-weight:700; }

        .toast { position:fixed;top:80px;right:20px;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:500;z-index:999;transform:translateX(120%);transition:transform 0.3s ease;display:flex;align-items:center;gap:8px; }
        .toast.show { transform:translateX(0); }
        .toast.connected { background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#22c55e; }
        .toast.disconnected { background:rgba(232,70,10,0.15);border:1px solid rgba(232,70,10,0.3);color:#E8460A; }
        .toast.info { background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);color:#60a5fa; }

        /* E2E badge */
        .e2e-badge { display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#22c55e;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);padding:2px 8px;border-radius:999px; }

        @media (max-width: 640px) {
            .top-nav { display:none; }
            .bottom-nav { display:flex; }
            body { height:100svh; }
            .chat-shell { height:calc(100svh - 70px); }
            .sidebar { position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;transform:translateX(0); }
            .sidebar.hidden-mobile { transform:translateX(-100%); }
            .chat-main { width:100%; }
            .back-btn { display:flex !important; }
        }
    </style>
</head>

<script>
/* ══════════════════════════════════════════════════════
   GUARD: redirect to login if not authenticated
══════════════════════════════════════════════════════ */
if (!Auth.requireAuth()) throw new Error('Not authenticated');

const ME = Auth.getUser();   // { id, name, email }
document.getElementById('navUserName').textContent = ME.name;

/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
let USERS        = [];       // loaded from /api/users
let activeUserId = null;
let socket       = null;
let myKeyPair    = null;     // ECDH key pair for this session

// In-memory decrypted message cache: { userId: [{from,text,time,created_at}] }
const conversations = {};

// Unread counts: { userId: number }
const unreadCounts  = {};

/* ══════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════ */
function nowTime() {
    const d = new Date();
    let h = d.getHours(), m = d.getMinutes();
    return `${h > 12 ? h - 12 : h || 12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
}

function fmtTime(iso) {
    if (!iso) return nowTime();
    const d = new Date(iso);
    let h = d.getHours(), m = d.getMinutes();
    return `${h > 12 ? h - 12 : h || 12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
}

function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function scrollToBottom(smooth = true) {
    const area = document.getElementById('messagesArea');
    area.scrollTo({ top: area.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
}

function autoResize(ta) {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

function showToast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${type === 'connected' ? '🟢' : type === 'disconnected' ? '🟠' : 'ℹ️'}</span> ${msg}`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function showTyping()  { document.getElementById('typingIndicator').classList.add('visible'); scrollToBottom(); }
function hideTyping()  { document.getElementById('typingIndicator').classList.remove('visible'); }

/* ══════════════════════════════════════════════════════
   CRYPTO INIT
══════════════════════════════════════════════════════ */
async function initCrypto() {
    myKeyPair = await SkillSwapCrypto.getOrCreateKeyPair();
    // Upload public key (idempotent — server just overwrites)
    try {
        const jwk = await SkillSwapCrypto.exportPublicKey(myKeyPair);
        await Auth.apiFetch('/api/users/me/public-key', {
            method: 'POST',
            body:   JSON.stringify({ publicKey: jwk }),
        });
    } catch (e) {
        console.warn('Public key upload failed:', e);
    }
}

/* Get (and cache) peer's shared AES key */
const _peerKeyCache = {};
async function getPeerSharedKey(peerId) {
    if (_peerKeyCache[peerId]) return _peerKeyCache[peerId];
    const res = await Auth.apiFetch(`/api/users/${peerId}/public-key`);
    if (!res.ok) throw new Error('Peer has no public key — cannot decrypt');
    const { publicKey } = await res.json();
    const sharedKey = await SkillSwapCrypto.getSharedKey(myKeyPair, publicKey, peerId);
    _peerKeyCache[peerId] = sharedKey;
    return sharedKey;
}

/* ══════════════════════════════════════════════════════
   LOAD USERS FROM API
══════════════════════════════════════════════════════ */
async function loadUsers() {
    const res = await Auth.apiFetch('/api/users');
    if (!res.ok) throw new Error('Failed to load users');
    const all = await res.json();
    // Exclude self
    USERS = all.filter(u => u.id !== ME.id);
    USERS.forEach(u => {
        if (!conversations[u.id]) conversations[u.id] = [];
        if (!unreadCounts[u.id])  unreadCounts[u.id]  = 0;
    });
}

/* ══════════════════════════════════════════════════════
   LOAD MESSAGES FOR A PEER (decrypt on load)
══════════════════════════════════════════════════════ */
async function loadMessages(peerId) {
    let sharedKey;
    try {
        sharedKey = await getPeerSharedKey(peerId);
    } catch (e) {
        console.warn(e.message);
        conversations[peerId] = [{ from: 'system', text: '⚠️ Encryption keys not exchanged yet. Ask this user to log in so keys can sync.', time: nowTime() }];
        return;
    }

    const res = await Auth.apiFetch(`/api/messages/${peerId}`);
    if (!res.ok) { console.error('Failed to fetch messages'); return; }
    const msgs = await res.json();

    const decrypted = [];
    for (const m of msgs) {
        try {
            const plaintext = await SkillSwapCrypto.decrypt(sharedKey, m.ciphertext, m.iv);
            decrypted.push({
                from: m.from_user === ME.id ? 'self' : 'other',
                text: plaintext,
                time: fmtTime(m.created_at),
                date: 'Today',
                id:   m.id,
            });
        } catch {
            decrypted.push({ from: 'system', text: '[Could not decrypt this message]', time: fmtTime(m.created_at) });
        }
    }
    conversations[peerId] = decrypted;
}

/* ══════════════════════════════════════════════════════
   SOCKET.IO — authenticated with JWT
══════════════════════════════════════════════════════ */
function initSocket() {
    try {
        socket = io({
            transports: ['websocket', 'polling'],
            auth: { token: Auth.getToken() },
        });

        socket.on('connect', () => showToast('Connected ✓', 'connected'));
        socket.on('disconnect', () => showToast('Reconnecting…', 'disconnected'));
        socket.on('connect_error', (err) => console.warn('Socket auth error:', err.message));

        socket.on('receive_message', async ({ fromUserId, ciphertext, iv, time }) => {
            let text = '[Encrypted message]';
            try {
                const sharedKey = await getPeerSharedKey(fromUserId);
                text = await SkillSwapCrypto.decrypt(sharedKey, ciphertext, iv);
            } catch (e) { console.warn('Decrypt incoming msg failed:', e); }

            const msg = { from: 'other', text, time: time || nowTime(), date: 'Today' };
            if (!conversations[fromUserId]) conversations[fromUserId] = [];
            conversations[fromUserId].push(msg);

            if (activeUserId === fromUserId) {
                const user = USERS.find(u => u.id === fromUserId);
                appendMessage(msg, user);
                scrollToBottom();
            } else {
                unreadCounts[fromUserId] = (unreadCounts[fromUserId] || 0) + 1;
            }
            renderContactList(document.getElementById('searchInput').value);
        });

        socket.on('user_typing',      ({ fromUserId }) => { if (activeUserId === fromUserId) showTyping(); });
        socket.on('user_stop_typing', ({ fromUserId }) => { if (activeUserId === fromUserId) hideTyping(); });

    } catch (e) {
        console.warn('Socket.IO unavailable:', e);
    }
}

/* ══════════════════════════════════════════════════════
   RENDER SIDEBAR
══════════════════════════════════════════════════════ */
function renderContactList(filter = '') {
    const list = document.getElementById('contactList');
    list.innerHTML = '';

    const filtered = USERS.filter(u =>
        u.name.toLowerCase().includes(filter.toLowerCase()) ||
        (u.role || '').toLowerCase().includes(filter.toLowerCase())
    );

    if (!filtered.length) {
        list.innerHTML = '<div style="padding:20px;color:#444;font-size:13px;text-align:center;">No users found</div>';
        return;
    }

    filtered.forEach(user => {
        const msgs  = conversations[user.id] || [];
        const last  = msgs[msgs.length - 1];
        const unread = unreadCounts[user.id] || 0;
        const teaching = (user.skills_teaching || []).slice(0,1).join('');
        const learning = (user.skills_learning || []).slice(0,1).join('');
        const skillLabel = teaching && learning ? `${teaching} → ${learning}` : (teaching || learning || user.role || '');
        const avatarSrc = `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.avatar_seed || user.name}`;

        const item = document.createElement('div');
        item.className = 'contact-item' + (activeUserId === user.id ? ' active' : '');
        item.dataset.userId = user.id;
        item.innerHTML = `
            <div class="contact-avatar">
                <img src="${avatarSrc}" alt="${user.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="avatar-fallback" style="display:none;">${user.name[0]}</div>
            </div>
            <div class="contact-info">
                <div class="contact-name">${user.name}</div>
                <div class="contact-skill">${skillLabel}</div>
                <div class="contact-last-msg">${last && last.from !== 'system' ? (last.from === 'self' ? 'You: ' : '') + last.text : '🔒 Start encrypted chat'}</div>
            </div>
            <div class="contact-meta">
                <span class="contact-time">${last ? last.time : ''}</span>
                ${unread > 0 ? `<span class="unread-badge">${unread}</span>` : ''}
            </div>
        `;
        item.addEventListener('click', () => openChat(user.id));
        list.appendChild(item);
    });
}

/* ══════════════════════════════════════════════════════
   OPEN A CHAT
══════════════════════════════════════════════════════ */
async function openChat(userId) {
    activeUserId = userId;
    unreadCounts[userId] = 0;
    const user = USERS.find(u => u.id === userId);
    const avatarSrc = `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.avatar_seed || user.name}`;

    // Load & decrypt messages from server
    await loadMessages(userId);

    // Update header
    document.getElementById('headerAvatar').src  = avatarSrc;
    document.getElementById('headerAvatar').alt  = user.name;
    document.getElementById('headerName').textContent = user.name;
    document.getElementById('headerStatusText').textContent = user.role || 'SkillSwap member';
    document.getElementById('headerDot').className = 'dot offline';
    document.getElementById('headerOnlineDot').style.display = 'none';
    const t = (user.skills_teaching || []).slice(0,1).join('');
    const l = (user.skills_learning || []).slice(0,1).join('');
    document.getElementById('headerSkill').textContent = t && l ? `${t} ↔ ${l}` : (t || l || '');
    document.getElementById('viewProfileBtn').href = `profile.html?id=${userId}`;

    document.getElementById('chatPlaceholder').style.display = 'none';
    const ac = document.getElementById('activeChat');
    ac.style.display = 'flex';
    ac.style.flexDirection = 'column';

    renderMessages(userId, user);
    scrollToBottom(false);
    renderContactList(document.getElementById('searchInput').value);

    if (window.innerWidth <= 640)
        document.getElementById('sidebar').classList.add('hidden-mobile');

    document.getElementById('msgInput').focus();
}

/* ══════════════════════════════════════════════════════
   RENDER MESSAGES
══════════════════════════════════════════════════════ */
function renderMessages(userId, user) {
    const area = document.getElementById('messagesArea');
    area.innerHTML = '';
    const msgs = conversations[userId] || [];
    msgs.forEach((msg, i) => {
        const prev     = msgs[i - 1];
        const noAvatar = prev && prev.from === msg.from;
        appendMessage(msg, user, noAvatar, false);
    });
}

function appendMessage(msg, user, noAvatar = false, animate = true) {
    if (msg.from === 'system') {
        const area = document.getElementById('messagesArea');
        const div  = document.createElement('div');
        div.style.cssText = 'text-align:center;font-size:11px;color:#555;padding:8px 0;';
        div.textContent = msg.text;
        area.appendChild(div);
        return;
    }

    const area = document.getElementById('messagesArea');
    const row  = document.createElement('div');
    row.className = `msg-row ${msg.from === 'self' ? 'self' : 'other'}${noAvatar ? ' no-avatar' : ''}`;
    if (!animate) row.style.animation = 'none';

    const avatarSrc     = msg.from === 'self'
        ? `https://api.dicebear.com/7.x/avataaars/svg?seed=${ME.email.split('@')[0]}`
        : `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.avatar_seed || user.name}`;
    const avatarInitial = msg.from === 'self' ? ME.name[0] : user.name[0];

    row.innerHTML = `
        <div class="msg-avatar">
            <img src="${avatarSrc}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="avatar-fallback" style="display:none;">${avatarInitial}</div>
        </div>
        <div class="msg-content">
            <div class="msg-bubble">${escHtml(msg.text)}</div>
            <span class="msg-time">${msg.time}</span>
        </div>
    `;
    area.appendChild(row);
}

/* ══════════════════════════════════════════════════════
   SEND MESSAGE  (encrypt → POST → socket emit)
══════════════════════════════════════════════════════ */
async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text  = input.value.trim();
    if (!text || activeUserId === null) return;

    // Optimistically show in UI
    const msg = { from: 'self', text, time: nowTime(), date: 'Today' };
    conversations[activeUserId].push(msg);
    const user = USERS.find(u => u.id === activeUserId);
    appendMessage(msg, user);
    scrollToBottom();
    input.value = '';
    autoResize(input);
    renderContactList(document.getElementById('searchInput').value);

    // Encrypt and send
    try {
        const sharedKey = await getPeerSharedKey(activeUserId);
        const { ciphertext, iv } = await SkillSwapCrypto.encrypt(sharedKey, text);

        // Persist to DB via REST
        await Auth.apiFetch('/api/messages', {
            method: 'POST',
            body:   JSON.stringify({ to_user: activeUserId, ciphertext, iv }),
        });

        // Real-time delivery via socket
        if (socket && socket.connected) {
            socket.emit('send_message', {
                toUserId: activeUserId,
                ciphertext,
                iv,
                time: msg.time,
            });
        }
    } catch (e) {
        console.error('Send failed:', e);
        showToast('Failed to send message', 'disconnected');
    }
}

/* ══════════════════════════════════════════════════════
   TYPING INDICATOR EMIT
══════════════════════════════════════════════════════ */
let typingTimeout;
function onInputTyping() {
    if (socket && socket.connected && activeUserId !== null) {
        socket.emit('typing', { toUserId: activeUserId });
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            socket.emit('stop_typing', { toUserId: activeUserId });
        }, 1500);
    }
}

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
async function init() {
    try {
        await initCrypto();
        await loadUsers();
        renderContactList();
        initSocket();

        // Auto-open from URL param (?user=ID)
        const openId = parseInt(new URLSearchParams(window.location.search).get('user'));
        if (openId && USERS.find(u => u.id === openId)) {
            await openChat(openId);
        }

        // Events
        document.getElementById('searchInput').addEventListener('input', e => renderContactList(e.target.value));
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('msgInput').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            onInputTyping();
        });
        document.getElementById('msgInput').addEventListener('input', e => autoResize(e.target));
        document.getElementById('backBtn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('hidden-mobile');
            activeUserId = null;
            document.getElementById('chatPlaceholder').style.display = 'flex';
            document.getElementById('activeChat').style.display = 'none';
            renderContactList();
        });

    } catch (err) {
        console.error('Init error:', err);
        showToast('Error loading chat. Check the backend is running.', 'disconnected');
    }
}

document.addEventListener('DOMContentLoaded', init);
</script>
