<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SkillSwap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="gradient-theme.css">
    <style>
        body { background: #0D0D0D; }
        .auth-card {
            background: #151515;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
        }
        .form-label { font-size: 13px; color: #888580; font-weight: 500; margin-bottom: 6px; display: block; }
        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: #F5F0E8;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .form-input:focus {
            border-color: #E8460A;
            box-shadow: 0 0 0 3px rgba(232,70,10,0.12);
        }
        .form-input::placeholder { color: #555; }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; }
    </style>
</head>
<body class="gradient-bg min-h-screen font-sans">

    <!-- Orbs -->
    <div class="orb" style="width:350px;height:350px;background:rgba(232,70,10,0.1);top:-60px;left:-60px;z-index:0;"></div>
    <div class="orb" style="width:250px;height:250px;background:rgba(232,70,10,0.07);bottom:-40px;right:-40px;z-index:0;"></div>

    <!-- Navbar -->
    <nav class="bg-glass sticky top-0 z-50" style="border-bottom:1px solid rgba(255,255,255,0.07);">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex-shrink-0 flex items-center gap-8">
                    <a href="splash.html" class="font-bluesakura text-xl" style="color:#F5F0E8;">SKiLlSWaP</a>
                    <div class="hidden sm:flex space-x-1">
                        <a href="discover.html" class="nav-link">Discover</a>
                        <a href="index.html#features" class="nav-link">Features</a>
                        <a href="index.html#about" class="nav-link">About</a>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <a href="login.html"  class="nav-link">Log in</a>
                    <a href="signup.html" class="gradient-button px-4 py-2 rounded-lg text-sm font-medium text-white nav-link-active">Sign up</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Form -->
    <div class="relative z-10 flex items-center justify-center min-h-[calc(100vh-64px)] py-12 px-4">
        <div class="auth-card w-full max-w-md p-8 animate-fade-in-up">

            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4" style="background:rgba(232,70,10,0.15);border:1px solid rgba(232,70,10,0.3);">
                    <svg class="w-7 h-7" style="color:#E8460A;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold mb-1" style="font-family:'Syne',sans-serif;color:#F5F0E8;">Create Account</h2>
                <p class="text-sm" style="color:#888580;">Join the community of learners and teachers</p>
            </div>

            <form id="signupForm" class="space-y-4">
                <div>
                    <label class="form-label" for="name">Full Name</label>
                    <input id="name" name="name" type="text" required placeholder="Your full name" class="form-input">
                    <p id="name-error" class="text-xs mt-1 hidden" style="color:#E8460A;"></p>
                </div>
                <div>
                    <label class="form-label" for="email-address">Email address</label>
                    <input id="email-address" name="email" type="email" autocomplete="email" required placeholder="you@example.com" class="form-input">
                    <p id="email-error" class="text-xs mt-1 hidden" style="color:#E8460A;"></p>
                </div>
                <div>
                    <label class="form-label" for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="new-password" required placeholder="Min. 6 characters" class="form-input">
                    <p id="password-error" class="text-xs mt-1 hidden" style="color:#E8460A;"></p>
                </div>
                <div>
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <input id="confirm-password" name="confirm-password" type="password" autocomplete="new-password" required placeholder="Re-enter password" class="form-input">
                    <p id="confirm-password-error" class="text-xs mt-1 hidden" style="color:#E8460A;"></p>
                </div>

                <button type="submit" class="gradient-button w-full py-3 rounded-xl text-white font-semibold text-sm mt-2">
                    Create Account →
                </button>
            </form>

            <div class="mt-6 pt-6 text-center" style="border-top:1px solid rgba(255,255,255,0.07);">
                <p class="text-sm" style="color:#888580;">
                    Already have an account?
                    <a href="login.html" class="font-semibold ml-1" style="color:#E8460A;">Log in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email-address').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            let isValid = true;

            const setErr = (id, msg) => { document.getElementById(id).textContent = msg; document.getElementById(id).classList.remove('hidden'); };
            const clearErr = (id) => document.getElementById(id).classList.add('hidden');

            if (!name) { setErr('name-error','Name is required'); isValid=false; } else clearErr('name-error');
            if (!email || !/\S+@\S+\.\S+/.test(email)) { setErr('email-error',!email?'Email is required':'Invalid email'); isValid=false; } else clearErr('email-error');
            if (!password || password.length < 6) { setErr('password-error', !password?'Password is required':'Min. 6 characters'); isValid=false; } else clearErr('password-error');
            if (password !== confirmPassword) { setErr('confirm-password-error','Passwords do not match'); isValid=false; } else clearErr('confirm-password-error');

            if (isValid) {
                try {
                    const res = await fetch('/api/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name,email,password}) });
                    const data = await res.json();
                    if (res.ok) { alert('Signup successful! Please login.'); window.location.href='login.html'; }
                    else alert(data.error||'Signup failed');
                } catch { alert('An error occurred. Please try again.'); }
            }
        });
    </script>
</body>
</html>
