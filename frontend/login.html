<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SkillSwap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="gradient-theme.css">
    <script src="auth.js"></script>
    <script src="crypto.js"></script>
    <style>
        body { background: #0D0D0D; }
        .auth-card {
            background: #151515;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
        }
        .form-label { font-size: 13px; color: #888580; font-weight: 500; margin-bottom: 6px; display: block; }
        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: #F5F0E8;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .form-input:focus {
            border-color: #E8460A;
            box-shadow: 0 0 0 3px rgba(232,70,10,0.12);
        }
        .form-input::placeholder { color: #555; }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; }
        #serverError {
            display: none;
            background: rgba(232,70,10,0.1);
            border: 1px solid rgba(232,70,10,0.3);
            color: #FF6B35;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen font-sans">

    <div class="orb" style="width:350px;height:350px;background:rgba(232,70,10,0.1);top:-60px;right:-60px;z-index:0;"></div>
    <div class="orb" style="width:250px;height:250px;background:rgba(232,70,10,0.07);bottom:-40px;left:-40px;z-index:0;"></div>

    <!-- Navbar -->
    <nav class="bg-glass sticky top-0 z-50" style="border-bottom:1px solid rgba(255,255,255,0.07);">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex-shrink-0 flex items-center gap-8">
                    <a href="splash.html" class="font-bluesakura text-xl" style="color:#F5F0E8;">SKiLlSWaP</a>
                    <div class="hidden sm:flex space-x-1">
                        <a href="discover.html" class="nav-link">Discover</a>
                        <a href="index.html#features" class="nav-link">Features</a>
                        <a href="index.html#about" class="nav-link">About</a>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <a href="login.html"  class="nav-link nav-link-active">Log in</a>
                    <a href="signup.html" class="gradient-button px-4 py-2 rounded-lg text-sm font-medium text-white">Sign up</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="relative z-10 flex items-center justify-center min-h-[calc(100vh-64px)] py-12 px-4">
        <div class="auth-card w-full max-w-md p-8 animate-fade-in-up">

            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4" style="background:rgba(232,70,10,0.15);border:1px solid rgba(232,70,10,0.3);">
                    <svg class="w-7 h-7" style="color:#E8460A;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold mb-1" style="font-family:'Syne',sans-serif;color:#F5F0E8;">Welcome Back</h2>
                <p class="text-sm" style="color:#888580;">Sign in to continue your learning journey</p>
            </div>

            <!-- Server error banner -->
            <div id="serverError" class="mb-4"></div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="form-label" for="email-address">Email address</label>
                    <input id="email-address" name="email" type="email" autocomplete="email" required placeholder="you@example.com" class="form-input">
                    <p id="email-error" class="text-xs mt-1 hidden" style="color:#E8460A;"></p>
                </div>
                <div>
                    <label class="form-label" for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="••••••••" class="form-input">
                    <p id="password-error" class="text-xs mt-1 hidden" style="color:#E8460A;"></p>
                </div>

                <div class="flex items-center justify-between pt-1">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input id="remember-me" type="checkbox" style="accent-color:#E8460A;">
                        <span class="text-sm" style="color:#888580;">Remember me</span>
                    </label>
                    <a href="#" class="text-sm font-medium" style="color:#E8460A;">Forgot password?</a>
                </div>

                <button type="submit" id="submitBtn" class="gradient-button w-full py-3 rounded-xl text-white font-semibold text-sm mt-2">
                    Sign in →
                </button>
            </form>

            <div class="mt-6 pt-6 text-center" style="border-top:1px solid rgba(255,255,255,0.07);">
                <p class="text-sm" style="color:#888580;">
                    Don't have an account?
                    <a href="signup.html" class="font-semibold ml-1" style="color:#E8460A;">Sign up</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Redirect if already logged in
        if (Auth.getToken()) window.location.href = 'discover.html';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email    = document.getElementById('email-address').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('submitBtn');
            const errBanner = document.getElementById('serverError');
            let valid = true;

            errBanner.style.display = 'none';

            if (!email || !/\S+@\S+\.\S+/.test(email)) {
                document.getElementById('email-error').textContent = !email ? 'Email is required' : 'Email is invalid';
                document.getElementById('email-error').classList.remove('hidden');
                valid = false;
            } else { document.getElementById('email-error').classList.add('hidden'); }

            if (!password) {
                document.getElementById('password-error').textContent = 'Password is required';
                document.getElementById('password-error').classList.remove('hidden');
                valid = false;
            } else { document.getElementById('password-error').classList.add('hidden'); }

            if (!valid) return;

            btn.disabled = true;
            btn.textContent = 'Signing in…';

            try {
                const res  = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();

                if (!res.ok) {
                    errBanner.textContent = data.error || 'Login failed';
                    errBanner.style.display = 'block';
                    return;
                }

                // Persist token + user
                Auth.save(data.token, data.user);

                // Generate E2E keys if not already done (first device login)
                try {
                    const kp  = await SkillSwapCrypto.getOrCreateKeyPair();
                    const jwk = await SkillSwapCrypto.exportPublicKey(kp);
                    await Auth.apiFetch('/api/users/me/public-key', {
                        method: 'POST',
                        body: JSON.stringify({ publicKey: jwk }),
                    });
                } catch (cryptoErr) {
                    console.warn('Crypto init failed (non-fatal):', cryptoErr);
                }

                window.location.href = 'discover.html';

            } catch (err) {
                errBanner.textContent = 'Network error. Is the backend running?';
                errBanner.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign in →';
            }
        });
    </script>
</body>
</html>
